name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # -------------------------------------------------------------------------
  # Job 1 — unit + integration tests across supported Python versions
  # -------------------------------------------------------------------------
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Syntax check (all .py files)
        run: python -m compileall . -q

      - name: Run test suite
        run: python -m unittest discover -s tests -v

  # -------------------------------------------------------------------------
  # Job 2 — Docker build + live smoke tests
  # Runs after all test matrix legs pass.
  # -------------------------------------------------------------------------
  docker:
    name: Docker build & smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sift:ci .

      - name: Start container
        run: |
          docker run -d \
            --name sift-ci \
            -p 8000:8000 \
            -e SIFT_DEV_NO_AUTH=1 \
            -e SIFT_COOKIE_SECURE=0 \
            sift:ci

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8000/healthz > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            echo "  waiting... ($i/20)"
            sleep 1
          done
          echo "Server did not start in time — dumping logs:"
          docker logs sift-ci
          exit 1

      - name: Health check returns 200
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/healthz)
          echo "GET /healthz → $status"
          [ "$status" = "200" ]

      - name: Webhook ingest — Wazuh alert accepted (200)
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8000/webhook/wazuh \
            -H "Content-Type: application/json" \
            -d '{
              "rule": {"id": "100001", "description": "Brute force attempt", "level": 10},
              "agent": {"name": "prod-web-01"},
              "data": {"srcip": "198.51.100.42"},
              "timestamp": "2024-01-01T00:00:00.000Z"
            }')
          echo "POST /webhook/wazuh → $status"
          [ "$status" = "200" ]

      - name: Webhook ingest — Suricata alert accepted (200)
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8000/webhook/suricata \
            -H "Content-Type: application/json" \
            -d '{
              "event_type": "alert",
              "src_ip": "203.0.113.7",
              "dest_ip": "10.0.0.5",
              "alert": {"signature": "ET SCAN Nmap", "severity": 2, "category": "Attempted Recon"},
              "timestamp": "2024-01-01T00:00:00.000Z"
            }')
          echo "POST /webhook/suricata → $status"
          [ "$status" = "200" ]

      - name: Unknown webhook source returns 404
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8000/webhook/notasource \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "POST /webhook/notasource → $status"
          [ "$status" = "404" ]

      - name: Oversized request body rejected (413)
        run: |
          big_body=$(python3 -c "import json; print(json.dumps({'data': 'x' * 600000}))")
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8000/webhook/wazuh \
            -H "Content-Type: application/json" \
            -d "$big_body")
          echo "POST /webhook/wazuh (600 KB) → $status"
          [ "$status" = "413" ]

      - name: Print container logs on failure
        if: failure()
        run: docker logs sift-ci

      - name: Stop and remove container
        if: always()
        run: docker rm -f sift-ci
